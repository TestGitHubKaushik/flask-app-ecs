name: trivy scan
on:
  workflow_call:
jobs:
  docker-image-scan:
    runs-on: ubuntu-latest
    steps:
       - name: docker login
         uses: docker/login-action@v4
         with:
           username: ${{ vars.DOCKERHUB_USER }}
           password: ${{ secrets.DOCKERHUB_PASS }}
       - name: trivy scan
         uses: aquasecurity/trivy-action@0.35.0
         with:
           image-ref: 'docker.io/kaushik2393/flask-python-app:latest'
           severity: 'CRITICAL'
           exit-code: "1"
      
  
