name: trivy scan
on:
  workflow_call:
jobs:
  docker-image-scan:
    runs-on: ubuntu-latest
    steps:
       - name: docker login
         uses: docker/login-action@v4
         with:
           username: ${{ vars.DOCKERHUB_USER }}
           password: ${{ secrets.DOCKERHUB_PASS }}
       - name: trivy scan
         uses: aquasecurity/trivy-action@0.33.1
         with:
           severity: 'CRITICAL,HIGH'
           exit-code: "1"
      
  
