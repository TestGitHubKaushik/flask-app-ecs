name: dependancies scan

on:
  workflow_call:

jobs:
  dependancies-scan:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: setup python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: 3.12

      - name: depe scan using pip-audit
        run: pip install pip-audit

      - name: scan depedencies
        run: pip-audit -r requirements.txt
        
  
